<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/logo-redondinha.png">
    <title>Chave do Torneio – Arena VB</title>

    <style>
        .torneio-body {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            padding-top: 100px;
            margin-top: 20px;
            display: block;
            min-height: 100vh;
        }

        .header-torneio {
            text-align: center;
            padding: 40px 20px;
        }

        .header-torneio h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(3.5rem, 7vw, 6rem);
            color: #fff;
            letter-spacing: 3px;
        }

        .header-torneio h1 span { color: #c9a87c; }

        .bracket-wrapper {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 100px;
            overflow-x: auto;
        }

        .bracket-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 60px;
            min-width: 800px;
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            padding: 60px;
            border-radius: 20px;
            border: 1px solid rgba(201, 168, 124, 0.15);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            gap: 40px;
        }

        .round-title {
            font-family: 'Bebas Neue', sans-serif;
            color: #c9a87c;
            font-size: 2rem;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .match-box {
            display: flex;
            flex-direction: column;
            gap: 5px;
            position: relative;
        }

        .team-input {
            width: 180px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(201, 168, 124, 0.3);
            padding: 12px;
            color: #fff;
            font-family: 'Roboto', sans-serif;
            font-size: 1.4rem;
            text-align: center;
            border-radius: 5px;
            transition: 0.3s;
        }

        .team-input:focus {
            border-color: #c9a87c;
            outline: none;
            background: rgba(201, 168, 124, 0.1);
        }

        .team-input::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .winner-box .team-input {
            border: 2px solid #c9a87c;
            background: linear-gradient(135deg, rgba(201, 168, 124, 0.2) 0%, rgba(0,0,0,0.8) 100%);
            font-weight: bold;
            box-shadow: 0 0 20px rgba(201, 168, 124, 0.3);
            width: 220px;
            padding: 20px;
            font-size: 1.8rem;
        }

        .trophy-icon {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px #c9a87c);
        }

        @media (max-width: 768px) {
            .header-torneio h1 { font-size: 4rem; }
        }
    </style>
</head>

<body class="torneio-body">
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img src="./img/logo.png" alt="Arena VB">
            </a>
            <nav class="navbar">
                <a href="index.html">Home</a>
                <a href="sobre.html">Sobre</a>
                <a href="index.html#services">Serviços</a>
                <a href="torneio.html">Torneios</a>
                <a href="index.html#address">Localização</a>
                <a href="horario.html">Horários</a>
                <a href="torneio.html">Torneios</a>
                <a href="galeria.html">Galeria</a>
            </nav>
        </section>
    </header>

    <div class="header-torneio">
        <h1>Chave do <span>Torneio</span></h1>
    </div>

    <section class="bracket-wrapper">
        <div class="bracket-container">
            
            <div class="round">
                <div class="round-title">Quartas</div>
                <div class="match-box">
                    <input type="text" class="team-input" placeholder="Dupla 01">
                    <input type="text" class="team-input" placeholder="Dupla 02">
                </div>
                <div class="match-box">
                    <input type="text" class="team-input" placeholder="Dupla 03">
                    <input type="text" class="team-input" placeholder="Dupla 04">
                </div>
                <div class="match-box">
                    <input type="text" class="team-input" placeholder="Dupla 05">
                    <input type="text" class="team-input" placeholder="Dupla 06">
                </div>
                <div class="match-box">
                    <input type="text" class="team-input" placeholder="Dupla 07">
                    <input type="text" class="team-input" placeholder="Dupla 08">
                </div>
            </div>

            <div class="round">
                <div class="round-title">Semifinal</div>
                <div class="match-box">
                    <input type="text" class="team-input" placeholder="Vencedor Q1">
                    <input type="text" class="team-input" placeholder="Vencedor Q2">
                </div>
                <div class="match-box" style="margin-top: 20px;">
                    <input type="text" class="team-input" placeholder="Vencedor Q3">
                    <input type="text" class="team-input" placeholder="Vencedor Q4">
                </div>
            </div>

            <div class="round">
                <div class="round-title">Final</div>
                <div class="match-box winner-box">
                    <span class="trophy-icon">🏆</span>
                    <input type="text" class="team-input" placeholder="CAMPEÃO">
                </div>
            </div>

        </div>
    </section>

    <section class="footer">
        <div class="share">
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/instagram-new.png" alt="instagram" />
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/facebook-new.png" alt="facebook" />
            <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/twitterx--v1.png" alt="twitter" />
        </div>
        <p style="color:#fff; font-size:1.4rem;">© 2025 Arena VB – Todos os direitos reservados</p>
    </section>
</body>

</html>
