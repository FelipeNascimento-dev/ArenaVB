<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="icon" href="../img/logo-redondinha.png">
    <title>Reserve sua Quadra - Arena VB</title>

    <style>
        .reserva-body-content {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            padding-top: 100px;
            display: block;
            min-height: 100vh;
        }

        .hero-strip {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .hero-strip h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 8vw, 6.5rem);
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 4px;
            line-height: 0.9;
        }

        .hero-strip h1 span {
            color: #c9a87c;
            display: block;
            font-size: 0.6em;
        }

        .hero-strip p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.6rem;
            margin-top: 15px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .form-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201, 168, 124, 0.2);
            padding: 45px;
            border-radius: 15px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 150px;
            height: 3px;
            background: #c9a87c;
            border-radius: 0 0 10px 10px;
        }

        .section-label {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.4rem;
            color: #c9a87c;
            margin: 30px 0 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            letter-spacing: 2px;
        }

        .section-label:first-child {
            margin-top: 0;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(201, 168, 124, 0.2);
        }

        .field-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .field label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1.2rem;
            margin-bottom: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .field input,
        .field select,
        .field textarea {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            color: #fff;
            font-size: 1.5rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            font-family: 'Roboto', sans-serif;
        }

        .field input:focus,
        .field select:focus,
        .field textarea:focus {
            border-color: #c9a87c;
            background: rgba(201, 168, 124, 0.05);
            outline: none;
            box-shadow: 0 0 15px rgba(201, 168, 124, 0.2);
            transform: translateY(-2px);
        }

        .btn-submit {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, #c9a87c 0%, #a68a64 100%);
            color: #000;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 2.2rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 8px;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(201, 168, 124, 0.4);
            filter: brightness(1.1);
        }

        .toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 40px;
            border-radius: 50px;
            color: #fff;
            font-weight: bold;
            font-size: 1.5rem;
            z-index: 10000;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.4s ease;
            display: none;
        }

        @keyframes slideUp {
            from {
                bottom: -50px;
                opacity: 0;
            }

            to {
                bottom: 40px;
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            .field-group {
                grid-template-columns: 1fr;
            }

            .form-card {
                padding: 25px;
            }

            .hero-strip h1 {
                font-size: 4rem;
            }
        }
    </style>
</head>

<body class="reserva-body-content">
    <header class="header">
        <section>
            <a href="../index.html" class="logo">
                <img src="../img/logo.png" alt="Arena VB">
            </a>
            <nav class="navbar">
                <a href="../index.html">Home</a>
                <a href="../html/sobre.html">Sobre</a>
                <a href="../index.html#services">Serviços</a>
                <a href="../index.html#review">Avaliações</a>
                <a href="../index.html#address">Localização</a>
                <a href="../html/horario.html">Horários</a>
                <a href="../html/torneio.html">Torneios</a>
                <a href="../html/galeria.html">Galeria</a>
            </nav>
        </section>
    </header>

    <div class="hero-strip">
        <h1>Solicite sua <span>Reserva</span></h1>
        <p>Preencha os dados abaixo e entraremos em contato.</p>
    </div>

    <section class="form-section">
        <div class="form-card">
            <div class="section-label">Dados Pessoais</div>
            <div class="field-group">
                <div class="field">
                    <label>Nome *</label>
                    <input type="text" id="nome" required>
                </div>
                <div class="field">
                    <label>Sobrenome *</label>
                    <input type="text" id="sobrenome" required>
                </div>
            </div>
            <div class="field">
                <label>E-mail *</label>
                <input type="email" id="email" required>
            </div>
            <div class="field">
                <label>WhatsApp *</label>
                <input type="tel" id="telefone" placeholder="(00) 00000-0000" required>
            </div>

            <div class="section-label" style="margin-top:30px">Detalhes</div>
            <div class="field">
                <label>Título da Reserva *</label>
                <input type="text" id="titulo" placeholder="Ex: Aluguel de Quadra" required>
            </div>
            <div class="field-group">
                <div class="field">
                    <label>Data *</label>
                    <input type="date" id="data" required>
                </div>
                <div class="field">
                    <label>Nº de Pessoas</label>
                    <input type="number" id="pessoas" min="1">
                </div>
            </div>
            <div class="field">
                <label>Mensagem/Observações *</label>
                <textarea id="descricao" required></textarea>
            </div>

            <button class="btn-submit" id="btnEnviar" onclick="enviarFormulario()">Enviar Solicitação</button>
        </div>
    </section>

    <div id="toast" class="toast"></div>

    <section class="footer">
        <div class="share">
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/instagram-new.png"
                alt="instagram" />
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/facebook-new.png"
                alt="facebook" />
            <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/twitterx--v1.png"
                alt="twitter" />
        </div>
        <p style="color:#fff; font-size:1.4rem;">© 2025 Arena VB – Todos os direitos reservados</p>
    </section>

    <script>
        // Máscara de Telefone
        document.getElementById('telefone').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '').slice(0, 11);
            if (v.length > 10) v = v.replace(/^(\d{2})(\d{5})(\d{4})$/, '($1) $2-$3');
            else if (v.length > 6) v = v.replace(/^(\d{2})(\d{4})(\d*)$/, '($1) $2-$3');
            else if (v.length > 2) v = v.replace(/^(\d{2})(\d*)$/, '($1) $2');
            e.target.value = v;
        });

        function showToast(msg, color) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.backgroundColor = color;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 5000);
        }

        async function enviarFormulario() {
            const fields = ['nome', 'sobrenome', 'email', 'telefone', 'titulo', 'data', 'descricao'];
            const data = {};
            let valid = true;

            fields.forEach(id => {
                const val = document.getElementById(id).value.trim();
                if (!val) valid = false;
                data[id] = val;
            });

            if (!valid) {
                showToast('⚠️ Preencha todos os campos obrigatórios.', '#c0392b');
                return;
            }

            const btn = document.getElementById('btnEnviar');
            btn.disabled = true;
            btn.textContent = 'Enviando...';

            try {
                const response = await fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        access_key: 'b9d49681-a86c-4b40-8479-d68ee4cb80e5',
                        subject: `Nova Reserva: ${data.titulo}`,
                        ...data
                    })
                });

                if (response.ok) {
                    showToast('✅ Reserva enviada com sucesso!', '#1b2e45');
                    fields.forEach(id => document.getElementById(id).value = '');
                } else {
                    throw new Error();
                }
            } catch (e) {
                showToast('❌ Erro ao enviar solicitação.', '#c0392b');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Enviar Solicitação';
            }
        }
    </script>
</body>

</html>
