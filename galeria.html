<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/logo-redondinha.png">
    <title>Galeria – Arena VB</title>

    <style>
        /* Fundo com degradê radial para dar profundidade */
        .galeria-body {
            background: radial-gradient(circle at top, #1a1a1a 0%, #000 100%);
            padding-top: 100px;
            display: block;
            min-height: 100vh;
            overflow-y: auto;
        }

        .header-galeria {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .header-galeria h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(4rem, 8vw, 6.5rem);
            color: #fff;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        /* Cor Dourada/Bege padrão da Arena VB */
        .header-galeria h1 span { color: #c9a87c; } 

        .header-galeria p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.6rem;
            margin-top: 15px;
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* Grid da Galeria */
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        /* Foto Card com Efeito Glassmorphism Dourado */
        .foto-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(201, 168, 124, 0.2); 
            padding: 12px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            cursor: pointer;
        }

        .foto-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 10px;
            transition: all 0.4s ease;
        }

        /* Efeito de Hover Dourado */
        .foto-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: #c9a87c;
            box-shadow: 0 20px 40px rgba(201, 168, 124, 0.2);
            background: rgba(201, 168, 124, 0.05);
        }

        .foto-card:hover img {
            transform: scale(1.05);
        }

        /* Botão Voltar Estilizado com Dourado */
        .btn-voltar-container {
            text-align: center;
            margin-bottom: 60px;
        }

        .btn-voltar {
            display: inline-block;
            padding: 15px 35px;
            background: transparent;
            color: #fff;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.8rem;
            text-decoration: none;
            border: 2px solid #c9a87c;
            border-radius: 5px;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn-voltar:hover {
            background: #c9a87c;
            color: #000;
            box-shadow: 0 0 20px rgba(201, 168, 124, 0.4);
            transform: scale(1.05);
        }

        @media (max-width: 600px) {
            .header-galeria h1 { font-size: 4.5rem; }
            .galeria-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body class="galeria-body">
    <header class="header">
        <section>
            <a href="index.html" class="logo">
                <img src="./img/logo.png" alt="Arena VB">
            </a>
            <nav class="navbar">
                <a href="index.html">Home</a>
                <a href="index.html#about">Sobre</a>
                <a href="index.html#services">Serviços</a>
                <a href="index.html#review">Avaliações</a>
                <a href="index.html#address">Localização</a>
                <a href="horario.html">Horários</a>
                <a href="torneio.html">Torneios</a>
                <a href="galeria.html">Galeria</a>
            </nav>
        </section>
    </header>

    <div class="header-galeria">
        <h1>Nossa <span>Galeria</span></h1>
        <p>Explore a estrutura premium da Arena VB através de nossas lentes.</p>
    </div>

    <div class="galeria-grid">
        <div class="foto-card">
            <img src="img/foto1.jpg" alt="Estrutura Arena">
        </div>
        <div class="foto-card">
            <img src="img/foto2.jpg" alt="Quadras de Areia">
        </div>
        <div class="foto-card">
            <img src="img/foto3.jpg" alt="Treino Noturno">
        </div>
    </div>

    <div class="btn-voltar-container" style="margin-bottom: 120px;">
        <a href="index.html" class="btn-voltar">← VOLTAR PARA HOME</a>
    </div>

    <section class="footer">
        <div class="share">
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/instagram-new.png" alt="instagram" />
            <img width="30" height="30" src="https://img.icons8.com/ios-glyphs/30/ffffff/facebook-new.png" alt="facebook" />
            <img width="30" height="30" src="https://img.icons8.com/ios-filled/30/ffffff/twitterx--v1.png" alt="twitter" />
        </div>
        <p style="color:#fff; font-size:1.4rem;">© 2025 Arena VB – Todos os direitos reservados</p>
    </section>
</body>

</html>
